services:
  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://postgres:123@host.docker.internal:5432/cafe_order?schema=public
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"

  client:
    build: ./client
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - server
    ports:
      - "5173:5173"